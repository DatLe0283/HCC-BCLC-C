<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner → Google Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .app-card { max-width: 500px; width: 100%; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    #reader { border-radius: 12px; overflow: hidden; min-height: 300px; background: #000; }
    #reader video { width: 100% !important; height: auto !important; object-fit: cover; }
    .btn-primary { background: #0d6efd; border: none; padding: 12px 24px; font-weight: 600; border-radius: 10px; }
    .btn-success { background: #198754; border: none; padding: 12px 24px; font-weight: 600; border-radius: 10px; }
    .alert-custom { border-radius: 12px; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="app-card bg-white p-4 mx-auto">
      <div class="text-center mb-4">
        <h2 class="mb-1">📷 Quét QR Code</h2>
        <p class="text-muted mb-0">Tự động điền Google Form</p>
      </div>

      <div class="text-center mb-3">
        <button id="startBtn" class="btn btn-primary btn-lg w-100" onclick="startScanner()">
          🎥 BẬT CAMERA
        </button>
        <button id="stopBtn" class="btn btn-secondary btn-lg w-100 d-none" onclick="stopScanner()">
          ⏹ DỪNG QUÉT
        </button>
      </div>

      <div id="reader" class="mb-3"></div>

      <div id="successBox" class="alert alert-success alert-custom d-none">
        <h5 class="mb-2">✅ Quét thành công!</h5>
        <p class="mb-3"><strong>Dữ liệu:</strong> <span id="scannedValue" class="text-break"></span></p>
        <button class="btn btn-success w-100" onclick="openForm()">
          🚀 Mở Google Form
        </button>
      </div>

      <div id="errorBox" class="alert alert-warning alert-custom d-none"></div>

      <div class="mt-3 text-center text-muted small">
        <i class="bi bi-shield-check"></i> <strong>"Prospective Evaluation of Longitudinal Quality-of-Life Changes in Advanced Hepatocellular Carcinoma Patients Receiving Systemic Therapy"<strong> <br>designed by Dat Le
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfh8HadqWdKZ8F32Lsg6if8USSH2-HuAasXCMf_pBL31axsqA/viewform";
    const ENTRY_ID = "434797286";
    
    let html5QrCode = null;
    let scannedData = null;

    async function startScanner() {
      document.getElementById('errorBox').classList.add('d-none');
      document.getElementById('successBox').classList.add('d-none');
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        stream.getTracks().forEach(t => t.stop());
        
        document.getElementById('startBtn').classList.add('d-none');
        document.getElementById('stopBtn').classList.remove('d-none');
        document.getElementById('reader').innerHTML = '';
        
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          onScanSuccess,
          onScanError
        );
      } catch (err) {
        showError("❌ " + err.message + "<br><br>👉 Hãy cấp quyền Camera khi trình duyệt yêu cầu!");
        document.getElementById('startBtn').classList.remove('d-none');
      }
    }

    function stopScanner() {
      if (html5QrCode) {
        html5QrCode.stop().then(() => {
          html5QrCode.clear();
          document.getElementById('reader').innerHTML = '<div class="text-white text-center py-4">Camera đã tắt</div>';
        });
      }
      document.getElementById('startBtn').classList.remove('d-none');
      document.getElementById('stopBtn').classList.add('d-none');
    }

    function onScanSuccess(text) {
      scannedData = text.trim();
      stopScanner();
      document.getElementById('scannedValue').textContent = scannedData;
      document.getElementById('successBox').classList.remove('d-none');
      document.getElementById('successBox').scrollIntoView({ behavior: 'smooth' });
    }

    function onScanError() { /* bỏ qua */ }

    function openForm() {
      if (!scannedData) return alert("Chưa có dữ liệu!");
      const url = `${FORM_URL}?usp=pp_url&entry.${ENTRY_ID}=${encodeURIComponent(scannedData)}`;
      window.open(url, '_blank');
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.innerHTML = msg;
      box.classList.remove('d-none');
    }
  </script>
</body>
</html>
